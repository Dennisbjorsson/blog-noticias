
## nome do workflows, aparece na actions
name: Pipelines ci/cd
on: 
   push:
     branches:
       - main
   workflow_dispatch: ## isso habilida o botão "run workflow" no github actions    

jobs:
  ## primeiro job: built 
   built: 
    runs-on: ubuntu-latest
   
    steps:

      - name: checkout do codigo 
        uses: actions/checkout@v5

      - name: Instalação do node 
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalação das depêndencias   
        run: npm install 
      - name: rodar o built  
        run: npm run build
